<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yslas &mdash; ALKABIL</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="theme-white" data-artist="yslas">

  <!-- header injected by js/site.js -->
  <header class="site-header"></header>

  <main>

    <!-- Bio -->
    <section class="page-section theme-white" style="padding-top: var(--header-h);">
      <div class="fgrid">
        <div class="blk artist-bio" style="--gd: 2/4/14/22;">
          <h1>YSLAS</h1>
          <p>YSLAS is a DJ/VJ duo. They specialize in making visuals and preparing bespoke DJ sets. Their focus is on experiential design where they spotlight liberatory phenomena.</p>
          <p class="artist-links">
            <a href="https://www.yslas.music" target="_blank" rel="noopener">yslas.music</a>
            <a href="https://instagram.com/yslas.flac" target="_blank" rel="noopener">instagram</a>
          </p>
        </div>
      </div>
    </section>

    <!-- Banner -->
    <section class="page-section theme-black artist-banner">
      <img src="../assets/yslas.jpg" alt="Yslas">
    </section>

    <!-- Release -->
    <section class="page-section theme-white section-height--medium">
      <div class="fgrid">
        <div class="blk release-cover clip-diamond" style="--gd: 3/15/22/26;">
          <img src="../assets/alkabil-web-5.jpg" alt="Yslas — new release coming soon">
        </div>
        <div class="blk" style="--gd: 5/2/8/13;">
          <h2 class="release-title">coming soon</h2>
        </div>
        <div class="blk release-desc" style="--gd: 8/2/10/13;">
          <p>New release coming soon.</p>
        </div>
        <div class="blk" style="--gd: 10/2/12/6;">
          <a class="btn" href="#">LISTEN/BUY</a>
        </div>
      </div>
    </section>

    <!-- Prev/Next built by js/site.js from the ARTISTS registry -->
    <nav class="item-pagination" data-artist-nav></nav>

  </main>

  <!-- footer injected by js/site.js -->
  <footer class="site-footer"></footer>

  <script src="../js/site.js"></script>
</body>
</html>
