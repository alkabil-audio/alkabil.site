<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yslas &mdash; ALKABIL</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/css/style.css">

<body class="theme-white" data-artist="yslas">

  <!-- header injected by js/site.js -->
  <header class="site-header"></header>

  <main>

    <!-- Bio -->
    <section class="page-section theme-white" style="padding-top: var(--header-h);">
      <div class="fgrid">
        <div class="blk artist-bio" style="--gd: 2/4/14/22;">
          <h1>YSLAS</h1>
          <p>YSLAS is a DJ/VJ duo. They specialize in making visuals and preparing bespoke DJ sets. Their focus is on experiential design where they spotlight liberatory phenomena.</p>
          <p class="artist-links">
            <a href="https://www.yslas.music" target="_blank" rel="noopener">yslas.music</a>
            <a href="https://instagram.com/yslas.flac" target="_blank" rel="noopener">instagram</a>
          </p>
        </div>
      </div>
    </section>

    <!-- Banner -->
    <section class="page-section theme-black artist-banner">
      <img src="/assets/yslas.jpg" alt="Yslas">
    </section>

    <!-- Release (one release = one whole <section>). To add ANOTHER release,
         copy this entire <section>…</section> and paste it above or below this
         one — whichever appears first in the HTML shows higher on the page. Keep
         the Prev/Next <nav> last. Nothing here needs measuring or positioning:
         just edit the cover, title, blurb and button. Guide: DOCUMENTATION §1.1.3. -->
    <section class="page-section theme-white artist-release">
      <div class="release-cover clip-diamond">
        <img src="/assets/cover-2kx2k.jpg" alt="Yatik cover">
      </div>
      <div class="release-text">
        <h2 class="release-title">Yatik</h2>
        <div class="release-desc">
          <p>Single from upcoming Yslas Digitales EP.</p>
        </div>
        <a class="btn" href="https://alkabilaudio.bandcamp.com/track/yatik" target="_blank" rel="noopener">LISTEN/BUY</a>
      </div>
    </section>

    <!-- Prev/Next built by js/site.js from the ARTISTS registry -->
    <nav class="item-pagination" data-artist-nav></nav>

  </main>

  <!-- footer injected by js/site.js -->
  <footer class="site-footer"></footer>

  <script src="/js/site.js"></script>
