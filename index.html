<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ALKABIL</title>
  <meta property="og:site_name" content="ALKABIL">
  <meta property="og:title" content="ALKABIL">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- header injected by js/site.js -->
  <header class="site-header"></header>

  <main>

    <!-- Hero -->
    <section class="page-section theme-black section-height--large">
      <div class="section-bg"><img src="assets/alkabil-web-1.jpg" alt=""></div>
      <!-- concentric-ring parallax: js/site.js fills this with rings of the
           image that slide with the pointer. The section-bg above is the
           fallback when JS is off or reduced-motion is set. -->
      <div class="hero-parallax" data-img="assets/alkabil-web-1.jpg" aria-hidden="true"></div>
      <div class="fgrid">
        <div class="blk hero-logo" style="--gd: 1/2/5/6;">
          <img src="assets/logo-white.png" alt="ALKABIL logo">
        </div>
        <div class="blk hero-title" style="--gd: 1/13/4/26;">
          <h2>ALKABIL.audio</h2>
        </div>
        <div class="blk hero-tagline" style="--gd: 4/20/6/26;">
          <p>SD&nbsp;-&nbsp;HTX&nbsp;-&nbsp;VSA&nbsp;-&nbsp;CDMX</p>
        </div>
      </div>
    </section>

    <!-- Gallery -->
    <section class="page-section theme-white">
      <div class="home-gallery">
        <img src="assets/alkabil-web-4.jpg" alt="">
        <img src="assets/alkabil-web-3.jpg" alt="">
      </div>
    </section>

    <!-- We are (full-bleed, not the fgrid) -->
    <section class="page-section theme-bright">
      <div class="we-are">
        <h2>WE ARE A bespoke micro Label - we&rsquo;re into:</h2>
        <h2 class="word-list">EXPERIMENTAL &bull; NOISY &bull; SWIRLING &bull; COSMOLOGICAL &bull; GNARLY &bull; ETHEREAL &bull; WINDY &bull; PLURALISTIC &bull; PRISMATIC</h2>
        <a class="btn we-are-contact" href="mailto:info@alkabil.audio">CONTACT</a>
      </div>
    </section>

    <!-- Newest release -->
    <section class="page-section theme-black section-height--medium">
      <div class="section-bg"><img src="assets/alkabil-web-5.jpg" alt=""></div>
      <!-- animated film-grain / static over the background image -->
      <div class="grain" aria-hidden="true"></div>
      <div class="fgrid">
        <div class="blk marquee" style="--gd: 1/1/5/27;" aria-label="NEWEST">
          <div class="track" aria-hidden="true">
            <span>NEWEST&nbsp;///</span><span>NEWEST&nbsp;///</span><span>NEWEST&nbsp;///</span>
          </div>
        </div>
        <div class="blk release-cover" style="--gd: 5/8/21/20;">
          <a href="https://tr.ee/vqnrRS0OUF" target="_blank" rel="noopener">
            <img src="assets/cover-2kx2k.jpg" alt="Newest release cover">
          </a>
        </div>
        <div class="blk marquee reverse" style="--gd: 21/1/25/27;" aria-label="release">
          <div class="track" aria-hidden="true">
            <span>release&nbsp;\\\</span><span>release&nbsp;\\\</span><span>release&nbsp;\\\</span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- footer injected by js/site.js -->
  <footer class="site-footer"></footer>

  <script src="js/site.js"></script>
</body>
</html>
